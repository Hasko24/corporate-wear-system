{% extends "base.html" %}
{% block content %}

<div class="page-header-band">
    <div class="header-row">
        <div>
            <span class="page-breadcrumb"><a href="{{ url_for('admin_dashboard') }}" >Admin</a> › Facilities</span>
            <h1>Facilities</h1>
        </div>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-ghost">← Admin</a>
    </div>
</div>

<div style="display:grid;grid-template-columns:380px 1fr;gap:28px;align-items:start;">

    <div class="surface">
        <div class="section-label">Add Facility</div>
        <form method="POST" style="display:flex;flex-direction:column;gap:14px;">
            <input type="hidden" name="action" value="add">
            <div class="form-group" style="margin:0;">
                <label>Facility Name</label>
                <input type="text" name="name" placeholder="for example, Örebro Hub" required>
            </div>
            <button type="submit" class="btn btn-primary">Add Facility</button>
        </form>
    </div>

    <div class="data-table-wrap">
        <table>
            <thead><tr><th>Facility Name</th><th></th></tr></thead>
            <tbody>
                {% for f in facilities %}
                <tr>
                    <td class="text-bold">{{ f.name }}</td>
                    <td style="text-align:right;">
                        <form method="POST" style="margin:0;display:inline;">
                            <input type="hidden" name="action" value="delete">
                            <input type="hidden" name="facility_id" value="{{ f.id }}">
                            <button type="submit" class="btn btn-ghost btn-sm" style="color:var(--red);" onclick="showConfirm(this.closest('form'),'Delete this facility?','This cannot be undone.');return false;">Delete</button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="2" class="empty-state">No facilities added yet.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
