{% extends "base.html" %}
{% block content %}

<div class="login-wrapper">
    <div class="login-box">
        <div class="login-box-header">
            <div class="login-logo">DHL Corporate Wear</div>
            <div style="font-size:0.9em;color:var(--text-2);margin-top:4px;">Set a new password</div>
        </div>
        <div class="login-box-body">
            <form method="POST">
                <div class="form-group">
                    <label>New Password</label>
                    <div style="position:relative;">
                        <input type="password" name="password" id="resetPwd" required
                               style="padding-right:42px;width:100%;box-sizing:border-box;">
                        <button type="button" onclick="togglePassword('resetPwd',this)"
                                style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-3);font-size:0.85em;">Show</button>
                    </div>
                </div>
                <button type="submit" class="btn-primary btn-full" style="margin-top:8px;">Reset Password</button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
