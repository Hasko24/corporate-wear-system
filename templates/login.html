{% extends "base.html" %}
{% block content %}
<div class="login-wrapper">
    <div class="login-box">
        <div class="login-box-header">
            <h1>DHL Corporate Wear</h1>
            <span>Uniform ordering system</span>
        </div>
        <div class="login-box-body">
            <form method="POST">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required autocomplete="email" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div style="position:relative;">
                        <input type="password" name="password" id="loginPassword" required autocomplete="current-password" style="padding-right:42px;width:100%;box-sizing:border-box;">
                        <button type="button" onclick="togglePassword('loginPassword', this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-3);font-size:0.85em;">Show</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Log in</button>
            </form>
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
