{% extends "base.html" %}
{% block content %}
<div class="page-header-band">
    <div class="header-row">
        <div>
            <span class="page-breadcrumb"><a href="{{ url_for('admin_dashboard') }}">Admin</a> › Size Guides</span>
            <h1>Size Guides</h1>
        </div>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-ghost">← Back</a>
    </div>
</div>

<div style="display:grid;grid-template-columns:380px 1fr;gap:28px;align-items:start;">
    <div class="surface" style="padding:24px;">
        <div class="section-label">Upload Size Guide</div>
        <form method="POST" enctype="multipart/form-data" style="margin-top:14px;display:flex;flex-direction:column;gap:14px;">
            <div class="form-group">
                <label>Brand / Company</label>
                <input type="text" name="brand" placeholder="for example, Helly Hansen" required>
            </div>
            <div class="form-group">
                <label>Size Chart Image</label>
                <input type="file" name="image" accept="image/*" required>
            </div>
            <button type="submit" class="btn-primary btn-full">Upload</button>
        </form>
    </div>

    <div class="data-table-wrap">
        <table>
            <thead>
                <tr><th>Brand</th><th>Preview</th><th></th></tr>
            </thead>
            <tbody>
                {% for guide in guides %}
                <tr>
                    <td>
                        <form method="POST" action="{{ url_for('edit_size_guide', guide_id=guide.id) }}" style="margin:0;display:flex;align-items:center;gap:8px;">
                            <input type="text" name="brand_name" value="{{ guide.brand_name }}" style="font-weight:600;width:180px;" required>
                            <button type="submit" class="btn btn-ghost btn-sm">Save</button>
                        </form>
                    </td>
                    <td>
                        <img src="{{ url_for('static', filename=guide.image_path) }}"
                             style="max-height:60px;border-radius:4px;">
                    </td>
                    <td style="text-align:right;">
                        <form method="POST" action="{{ url_for('delete_size_guide', guide_id=guide.id) }}" style="margin:0;display:inline;">
                            <button type="submit" class="btn btn-danger btn-sm" onclick="showConfirm(this.closest('form'),'Delete this size guide?','This cannot be undone.');return false;">Delete</button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="3" class="empty-state">No size guides uploaded yet.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
