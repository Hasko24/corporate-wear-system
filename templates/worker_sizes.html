{% extends "base.html" %}
{% block content %}
<div class="page-header-band">
    <div class="header-row">
        <div>
            <span class="page-breadcrumb"><a href="{{ url_for('view_team') }}">My Team</a> › Sizes</span>
            <h1>Member Sizes</h1>
        </div>
        <a href="{{ url_for('view_team') }}" class="btn btn-ghost">← Back</a>
    </div>
</div>

<div style="display:grid;grid-template-columns:360px 1fr;gap:28px;align-items:start;">
    <div class="surface" style="padding:24px;">
        <div class="section-label">Update Size</div>
        <form method="POST" style="margin-top:14px;display:flex;flex-direction:column;gap:14px;">
            <div class="form-group">
                <label>Clothing Type</label>
                <select name="product_type">
                    <option value="SHIRT">Shirt</option>
                    <option value="PANTS">Pants</option>
                    <option value="JACKET">Jacket</option>
                    <option value="SHOES">Shoes</option>
                    <option value="HAT">Hat</option>
                    <option value="OTHER">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Size</label>
                <input type="text" name="size" placeholder="for example, M, L, 42" required>
            </div>
            <button type="submit" class="btn-primary btn-full">Save Size</button>
        </form>
    </div>

    <div class="data-table-wrap">
        <table>
            <thead><tr><th>Type</th><th>Size</th></tr></thead>
            <tbody>
                {% for s in sizes %}
                <tr>
                    <td>{{ s.product_type }}</td>
                    <td style="font-weight:600;">{{ s.size }}</td>
                </tr>
                {% else %}
                <tr><td colspan="2" class="empty-state">No sizes recorded yet.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
