{% extends "base.html" %}
{% block content %}

<div class="login-wrapper">
    <div class="login-box">
        <div class="login-box-header">
            <div class="login-logo">DHL Corporate Wear</div>
            <div style="font-size:0.9em;color:var(--text-2);margin-top:4px;">Reset your password</div>
        </div>
        <div class="login-box-body">
            <form method="POST">
                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" name="email" required placeholder="your@email.com" autofocus>
                </div>
                <button type="submit" class="btn-primary btn-full" style="margin-top:8px;">Send Reset Link</button>
            </form>
            <div style="text-align:center;margin-top:16px;">
                <a href="{{ url_for('login') }}" style="color:var(--text-3);font-size:0.88em;">← Back to login</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
